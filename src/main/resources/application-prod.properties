# Production Profile - MySQL Configuration

# Update these values for your production MySQL server
spring.datasource.url=jdbc:mysql://localhost:3306/finaccessdb?useSSL=true&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}

# Validate schema in production (don't auto-create)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Production logging - less verbose
logging.level.org.springframework=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.example.finaccesscore=INFO

# Connection pool optimization for production
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=10
